<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%" fill="none" style="display: block;">
  <defs>
    <!-- Cyan Cyber Glow -->
    <filter id="cyberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" floodColor="#00E5D2" floodOpacity="0.6" />
      <feDropShadow dx="0" dy="0" stdDeviation="25" floodColor="#00E5D2" floodOpacity="0.3" />
    </filter>

    <!-- Wallet Glass Gradients -->
    <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5D2" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#00A896" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#021E1C" stop-opacity="0.4" />
    </linearGradient>

    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5D2" stop-opacity="0.8" />
      <stop offset="35%" stop-color="#00E5D2" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#008276" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00E5D2" stop-opacity="0.6" />
    </linearGradient>

    <!-- Metallic Coin Gradients -->
    <linearGradient id="coinMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="25%" stop-color="#00E5D2" />
      <stop offset="50%" stop-color="#008276" />
      <stop offset="75%" stop-color="#004D46" />
      <stop offset="100%" stop-color="#00E5D2" />
    </linearGradient>

    <linearGradient id="coinBevel" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001F1C" />
      <stop offset="50%" stop-color="#00A896" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>

    <!-- Reflection highlight -->
    <linearGradient id="reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND GLOW EFFECT (Under wallet) -->
  <circle cx="280" cy="200" r="130" fill="#00E5D2" fill-opacity="0.08" filter="url(#cyberGlow)" />
  <circle cx="280" cy="200" r="60" fill="#00E5D2" fill-opacity="0.12" filter="url(#cyberGlow)" />

  <!-- MAIN WALLET BODY GROUP (Slightly tilted for 3D perspective) -->
  <g transform="translate(10, -5)">
    
    <!-- Outer Shadow and back fold -->
    <rect x="155" y="105" width="280" height="195" rx="24" fill="#011A18" fill-opacity="0.6" stroke="#00E5D2" stroke-opacity="0.25" stroke-width="2" />
    
    <!-- Middle Glass layer (depth effect) -->
    <rect x="160" y="112" width="270" height="185" rx="22" fill="url(#glassBody)" stroke="url(#glassBorder)" stroke-width="1.5" />
    
    <!-- Inner structural line pattern / futuristic tracks -->
    <path d="M 180,140 L 410,140 M 180,270 L 410,270" stroke="#00E5D2" stroke-opacity="0.15" stroke-width="1" />
    <path d="M 195,140 L 195,270 M 395,140 L 395,270" stroke="#00E5D2" stroke-opacity="0.1" stroke-width="1" />

    <!-- Front main glass card layer -->
    <rect x="165" y="118" width="260" height="175" rx="20" fill="url(#glassBody)" stroke="url(#glassBorder)" stroke-width="2.5" />
    
    <!-- Dashed stitching line -->
    <rect x="173" y="126" width="244" height="159" rx="14" fill="none" stroke="#00E5D2" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="6,4" />

    <!-- Glass reflections (diagonal highlights) -->
    <path d="M 167,119 L 360,119 L 167,270 Z" fill="url(#reflection)" />

    <!-- WALLET STRAP WITH EMBOSSED 'C' LOGO -->
    <g transform="translate(320, 168)" filter="url(#intenseGlow)">
      <!-- Strap body -->
      <path d="M 0,10 L 75,10 C 95,10 95,65 75,65 L 0,65 Z" fill="#012421" stroke="url(#glassBorder)" stroke-width="2.5" />
      <path d="M 0,10 L 75,10 C 95,10 95,65 75,65 L 0,65 Z" fill="url(#glassBody)" />
      
      <!-- Strap stitch -->
      <path d="M 0,16 L 71,16 C 84,16 84,59 71,59 L 0,59" fill="none" stroke="#00E5D2" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="5,3" />
      
      <!-- Strap Metallic circle -->
      <circle cx="45" cy="37" r="18" fill="url(#coinMetal)" stroke="#00F0FF" stroke-width="1.5" />
      <circle cx="45" cy="37" r="14" fill="url(#coinBevel)" />
      
      <!-- Embossed 'C' in Strap -->
      <text x="45" y="43" font-family="system-ui, sans-serif" font-weight="900" font-size="18" fill="#00F0FF" text-anchor="middle">C</text>
    </g>
  </g>

  <!-- FLOATING COINS (Varying sizes, glowing, with emboss effect) -->
  
  <!-- COIN 1 (Top-Right, medium size, slight rotation) -->
  <g transform="translate(450, 110)" filter="url(#intenseGlow)">
    <!-- Shadow -->
    <circle cx="0" cy="5" r="35" fill="#000000" fill-opacity="0.4" filter="url(#cyberGlow)" />
    <!-- Coin Body -->
    <circle cx="0" cy="0" r="35" fill="url(#coinMetal)" stroke="#00F0FF" stroke-width="2" />
    <circle cx="0" cy="0" r="28" fill="url(#coinBevel)" stroke="#00E5D2" stroke-width="1.5" />
    <!-- Center symbol -->
    <text x="0" y="11" font-family="system-ui, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" text-anchor="middle" style="text-shadow: 0 0 10px rgba(0,229,210,0.8);">C</text>
  </g>

  <!-- COIN 2 (Bottom-Right, larger, closest) -->
  <g transform="translate(460, 265)" filter="url(#intenseGlow)">
    <!-- Shadow -->
    <circle cx="0" cy="8" r="42" fill="#000000" fill-opacity="0.5" filter="url(#cyberGlow)" />
    <!-- Coin Body -->
    <circle cx="0" cy="0" r="42" fill="url(#coinMetal)" stroke="#00F0FF" stroke-width="2.5" />
    <circle cx="0" cy="0" r="34" fill="url(#coinBevel)" stroke="#00E5D2" stroke-width="2" />
    <!-- Center symbol -->
    <text x="0" y="13" font-family="system-ui, sans-serif" font-weight="900" font-size="38" fill="#FFFFFF" text-anchor="middle" style="text-shadow: 0 0 12px rgba(0,229,210,0.9);">C</text>
  </g>

  <!-- COIN 3 (Far-Right / Middle, smaller, deep background) -->
  <g transform="translate(525, 185)" opacity="0.8" filter="url(#intenseGlow)">
    <!-- Shadow -->
    <circle cx="0" cy="4" r="22" fill="#000000" fill-opacity="0.4" filter="url(#cyberGlow)" />
    <!-- Coin Body -->
    <circle cx="0" cy="0" r="22" fill="url(#coinMetal)" stroke="#00F0FF" stroke-width="1.5" />
    <circle cx="0" cy="0" r="17" fill="url(#coinBevel)" stroke="#00E5D2" stroke-width="1" />
    <!-- Center symbol -->
    <text x="0" y="6" font-family="system-ui, sans-serif" font-weight="900" font-size="18" fill="#FFFFFF" text-anchor="middle" style="text-shadow: 0 0 8px rgba(0,229,210,0.8);">C</text>
  </g>
</svg>
